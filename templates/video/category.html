{% extends "base.html" %}

{% block title %}{{ category.name }} - 仿B站{% endblock %}

{% block content %}
<h1>{{ category.name }} 分类</h1>
<div class="video-list">
    {% for video in videos %}
    <div class="video-card">
        <a href="{% url 'video_detail' video.pk %}">
            <img src="{{ video.cover.url }}" alt="{{ video.title }}">
            <h3>{{ video.title }}</h3>
            <p>{{ video.uploader.username }} · {{ video.view_count }} 播放</p>
        </a>
    </div>
    {% empty %}
    <p>该分类下暂无视频</p>
    {% endfor %}
</div>
{% endblock %}
