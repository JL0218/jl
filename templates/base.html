<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}三站{% endblock %}</title>
    <style>
        .nav { display: flex; gap: 20px; padding: 10px; background: #00a1d6; color: white; }
        .nav a { color: white; text-decoration: none; }
        .video-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }
        .video-card { border: 1px solid #eee; padding: 10px; }
        .video-card img { width: 100%; height: 120px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{% url 'index' %}">首页</a>
        {% for category in categories %}
        <a href="{% url 'category_videos' category.slug %}">{{ category.name }}</a>
        {% endfor %}
        <div style="margin-left: auto;">
            {% if user.is_authenticated %}
                <a href="{% url 'upload_video' %}">投稿</a>
                <a href="{% url 'logout' %}">退出</a>
            {% else %}
                <a href="{% url 'login' %}">登录</a>
                <a href="{% url 'register' %}">注册</a>
            {% endif %}
        </div>
    </div>
    <div class="content" style="padding: 20px;">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
