<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title> 三站 </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #f5f5f5;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 {
            color: #333;
        }
        a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background: #00a1d6;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        a:hover {
            background: #008bb6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 三站 </h1>
        <p>欢迎来到你的视频网站</p>

        <a href="http://127.0.0.1:8000/" target="_blank">进入网站首页</a>
    </div>
</body>
</html>
